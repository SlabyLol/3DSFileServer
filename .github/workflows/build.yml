name: Build 3DS File Server

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build .3dsx with devkitARM
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup icon and Makefile
        run: python3 scripts/setup_build.py

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export CTRULIB=$DEVKITPRO/libctru
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          make
          echo "=== Output ==="
          find . \( -name "*.3dsx" -o -name "*.smdh" \) | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-fileserver
          path: |
            **/*.3dsx
            **/*.smdh
          if-no-files-found: error

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.3dsx
            **/*.smdh
          body: |
            ## 3DS File Server
            ### Installation
            1. Copy `3ds-fileserver.3dsx` to `/3ds/` on your SD card
            2. Launch via Homebrew Launcher
            3. Open the IP shown on screen in your browser
            ### Features
            - Browse, Upload, Download, Delete, Rename, New folder, New file, Edit
            - All write actions need confirmation on console [A]/[B]
            - Port 3760
