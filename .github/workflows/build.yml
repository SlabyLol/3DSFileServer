name: Build 3DS File Server

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build .3dsx with devkitARM
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnose environment
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          echo "=== Compiler ==="
          arm-none-eabi-gcc --version
          echo "=== Tools ==="
          which 3dsxtool  && 3dsxtool  --version 2>/dev/null || echo "3dsxtool missing"
          which smdhtool  && smdhtool  --version 2>/dev/null || echo "smdhtool missing"
          which makerom   2>/dev/null  || echo "makerom missing"
          echo "=== devkitPro layout ==="
          ls /opt/devkitpro/
          echo "=== libctru ==="
          ls /opt/devkitpro/libctru/lib/ 2>/dev/null || echo "libctru/lib missing"
          echo "=== specs ==="
          find /opt/devkitpro -name "3dsx.specs" 2>/dev/null || echo "3dsx.specs not found"
          echo "=== pacman list ==="
          /opt/devkitpro/pacman/bin/pacman -Q 2>/dev/null || true

      - name: Install missing 3DS tools if needed
        run: |
          export DEVKITPRO=/opt/devkitpro
          # Only install if 3dsxtool is missing
          if ! command -v 3dsxtool >/dev/null 2>&1; then
            echo "Installing 3ds-dev..."
            /opt/devkitpro/pacman/bin/pacman -S --noconfirm 3ds-dev || true
          else
            echo "3dsxtool already present, skipping install"
          fi

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export CTRULIB=$DEVKITPRO/libctru
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          make CC=$DEVKITARM/bin/arm-none-eabi-gcc \
               CXX=$DEVKITARM/bin/arm-none-eabi-g++ \
               AS=$DEVKITARM/bin/arm-none-eabi-as \
               AR=$DEVKITARM/bin/arm-none-eabi-ar \
               OBJCOPY=$DEVKITARM/bin/arm-none-eabi-objcopy
          echo "=== Output files ==="
          find . -name "*.3dsx" -o -name "*.smdh" -o -name "*.elf" | sort

      - name: Upload .3dsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-fileserver
          path: |
            **/*.3dsx
            **/*.smdh
          if-no-files-found: error

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.3dsx
            **/*.smdh
          body: |
            ## 3DS File Server

            ### Installation
            1. Copy `3ds-fileserver.3dsx` to the `/3ds/` folder on your SD card
            2. Launch via the Homebrew Launcher
            3. Open the IP + port shown on screen in your browser

            ### Features
            - 📂 Browse files & folders
            - ⬆️ Upload from browser (confirmation required)
            - ⬇️ Download files
            - 🗑️ Delete files/folders (confirmation required)
            - ✏️ Rename files/folders (confirmation required)
            - 📁 Create new folders (confirmation required)
            - 📄 Create new empty files (confirmation required)
            - ✏️ Edit text files in browser (confirmation required)
            - **Port: 3760**
