name: Build 3DS File Server

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build .3dsx with devkitARM
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export CTRULIB=$DEVKITPRO/libctru
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH

          # Show what tools are available
          echo "=== Tools ==="
          ls $DEVKITPRO/tools/bin/
          echo "=== libctru ==="
          ls $DEVKITPRO/libctru/lib/ 2>/dev/null && echo "libctru OK" || echo "libctru MISSING"

          # Build .elf
          make CC=$DEVKITARM/bin/arm-none-eabi-gcc \
               CXX=$DEVKITARM/bin/arm-none-eabi-g++ \
               AS=$DEVKITARM/bin/arm-none-eabi-as \
               AR=$DEVKITARM/bin/arm-none-eabi-ar \
               OBJCOPY=$DEVKITARM/bin/arm-none-eabi-objcopy

          echo "=== All output files ==="
          find . \( -name "*.3dsx" -o -name "*.smdh" -o -name "*.elf" \) | sort

          # If .elf exists but .3dsx doesn't, create it manually
          if [ -f 3ds-fileserver.elf ] && [ ! -f 3ds-fileserver.3dsx ]; then
            echo "=== .elf found but no .3dsx — running 3dsxtool manually ==="
            # Build smdh first
            smdhtool --create "3DS File Server" "WiFi File Manager" "3DS" \
              $DEVKITPRO/libctru/default_icon.png 3ds-fileserver.smdh 2>/dev/null || \
            smdhtool --create "3DS File Server" "WiFi File Manager" "3DS" 3ds-fileserver.smdh || true
            # Build 3dsx
            3dsxtool 3ds-fileserver.elf 3ds-fileserver.3dsx \
              --smdh=3ds-fileserver.smdh \
              --romfs=romfs 2>/dev/null || \
            3dsxtool 3ds-fileserver.elf 3ds-fileserver.3dsx \
              --smdh=3ds-fileserver.smdh || true
            echo "=== After manual 3dsxtool ==="
            find . \( -name "*.3dsx" -o -name "*.smdh" \) | sort
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-fileserver
          path: |
            **/*.3dsx
            **/*.smdh
          if-no-files-found: error

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.3dsx
            **/*.smdh
          body: |
            ## 3DS File Server

            ### Installation
            1. Copy `3ds-fileserver.3dsx` to the `/3ds/` folder on your SD card
            2. Launch via the Homebrew Launcher
            3. Open the IP + port shown on screen in your browser

            ### Features
            - 📂 Browse files & folders
            - ⬆️ Upload from browser (confirmation required)
            - ⬇️ Download files
            - 🗑️ Delete files/folders (confirmation required)
            - ✏️ Rename files/folders (confirmation required)
            - 📁 Create new folders (confirmation required)
            - 📄 Create new empty files (confirmation required)
            - ✏️ Edit text files in browser (confirmation required)
            - **Port: 3760**
